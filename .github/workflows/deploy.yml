name: Deploy To Server

on:
  push:
    branches:
      - master    # Deploy production khi push lên main
      - staging # Deploy lên server test khi push lên staging
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false # Bắt buộc xếp hàng, không cho 2 người chạy cùng lúc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kéo Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Manifest-based: khong can lich su git

      - name: 🔍 Đọc cấu hình Deploy
        id: config
        run: |
          # Phát hiện nhánh → xác định môi trường
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          # 🛡️ Chỉ cho phép deploy từ master hoặc staging
          if [ "$BRANCH_NAME" != "master" ] && [ "$BRANCH_NAME" != "staging" ]; then
            echo "❌ LỖI: Không được deploy từ nhánh [$BRANCH_NAME]!"
            echo "   Chỉ cho phép: master (production) hoặc staging (test)."
            exit 1
          fi

          if [ "$BRANCH_NAME" = "staging" ]; then
            DEPLOY_ENV="test"
          else
            DEPLOY_ENV="production"
          fi
          echo "DEPLOY_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> $GITHUB_ENV
          echo "📌 Nhánh: $BRANCH_NAME → Môi trường: $DEPLOY_ENV"

          # Đọc cấu hình chung
          HAS_BUILD=$(jq -r '.has_build_step // false' deploy-config.json)
          BUILD_CMD=$(jq -r '.build_command // "npm run build"' deploy-config.json)

          # Đọc deploy_method từ môi trường (mặc định: ftp)
          DEPLOY_METHOD=$(jq -r --arg env "$DEPLOY_ENV" '.[$env].deploy_method // "ftp"' deploy-config.json)
          echo "DEPLOY_METHOD=$DEPLOY_METHOD" >> $GITHUB_ENV
          echo "📦 Phương thức: $DEPLOY_METHOD"

          # Đọc server từ đúng môi trường (chỉ cần khi FTP hoặc Rsync)
          SERVER_NAME=$(jq -r --arg env "$DEPLOY_ENV" '.[$env].server // ""' deploy-config.json | tr 'a-z' 'A-Z')
          echo "🖥️ Server: ${SERVER_NAME:-'(không dùng FTP)'}"

          echo "SERVER_NAME=$SERVER_NAME" >> $GITHUB_ENV
          echo "HAS_BUILD=$HAS_BUILD" >> $GITHUB_ENV
          echo "BUILD_CMD=$BUILD_CMD" >> $GITHUB_ENV

      # ── Chế độ ZIP: Bỏ qua toàn bộ (chỉ cần tạo tag để release) ──
      - name: ℹ️ Bỏ qua deploy (chế độ ZIP)
        if: env.DEPLOY_METHOD == 'zip'
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  📦 Môi trường [${{ env.DEPLOY_ENV }}] đang ở chế độ ZIP  ║"
          echo "║  → Bỏ qua FTP deploy.                           ║"
          echo "║  → Tạo tag (vd: git tag v1.0.0) để tạo Release. ║"
          echo "╚══════════════════════════════════════════════════╝"

      # ── Chế độ FTP: Build + Deploy lên server ──
      - name: ⚙️ Cài đặt Node.js
        if: env.DEPLOY_METHOD == 'ftp' || env.DEPLOY_METHOD == 'ssh'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Cài đặt dependencies dự án (nếu cần build)
        if: (env.DEPLOY_METHOD == 'ftp' || env.DEPLOY_METHOD == 'ssh') && env.HAS_BUILD == 'true'
        run: npm ci

      - name: 🔨 Build dự án
        if: (env.DEPLOY_METHOD == 'ftp' || env.DEPLOY_METHOD == 'ssh') && env.HAS_BUILD == 'true'
        run: ${{ env.BUILD_CMD }}

      - name: 📦 Cài đặt thư viện deploy
        if: env.DEPLOY_METHOD == 'ftp'
        run: npm install --no-save basic-ftp apache-crypt

      - name: 🚀 Chạy Script Deploy (FTP)
        if: env.DEPLOY_METHOD == 'ftp'
        run: node .github/scripts/deploy.cjs
        env:
          GITHUB_REPO: ${{ github.repository }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          SSH_HOST: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).host }}
          SSH_USER: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).user }}
          SSH_PASS: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).pass }}
          ROOT_PATH: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).root_path }}
          FTP_DIR: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).ftp_dir }}
          FTP_GIT: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).ftp_git }}

      # ── Chế độ SSH: Triển khai qua SSH rsync ──
      - name: 🔑 Cài đặt SSH Key cho Deploy
        if: env.DEPLOY_METHOD == 'ssh'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).private_key }}

      - name: 🚀 Chạy Script Deploy (SSH)
        if: env.DEPLOY_METHOD == 'ssh'
        run: bash .github/scripts/deploy-rsync.sh
        env:
          GITHUB_REPO: ${{ github.repository }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          SSH_HOST: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).host }}
          SSH_USER: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).user }}
          SSH_PORT: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).ssh_port }}
          ROOT_PATH: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).root_path }}
          FTP_GIT: ${{ fromJson(secrets[format('{0}_CONFIG', env.SERVER_NAME)]).ftp_git }}

# ──────────────────────────────────────────────────────────
# 📦 TỰ ĐỘNG TẠO RELEASE KHI DEVELOPER PUSH TAG MỚI
# ──────────────────────────────────────────────────────────
# Cách dùng:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Kết quả: GitHub tự động build → nén ZIP → tạo Release
# Admin/PM chỉ cần vào mục Releases trên GitHub tải file ZIP sạch.
# ──────────────────────────────────────────────────────────

name: 📦 Create Release on Tag

on:
  push:
    tags:
      - 'v*'  # Chỉ chạy khi push tag bắt đầu bằng "v" (vd: v1.0.0, v2.1.3)

permissions:
  contents: write  # Cần quyền write để tạo Release và upload file

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kéo Source Code
        uses: actions/checkout@v4

      - name: 🔍 Đọc cấu hình Build
        id: config
        run: |
          BUILD_CMD=$(jq -r '.build_command // "npm run build"' deploy-config.json)
          SOURCE_FOLDER=$(jq -r '.source_folder | select(. != null and . != "") // "public"' deploy-config.json)
          PROJECT_DIR=$(jq -r '.production.project_dir // .project_dir // "project"' deploy-config.json)
          echo "BUILD_CMD=$BUILD_CMD" >> $GITHUB_ENV
          echo "SOURCE_FOLDER=$SOURCE_FOLDER" >> $GITHUB_ENV
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          # 🛡️ Validate BUILD_CMD (chỉ cho phép npm/npx commands)
          if ! echo "$BUILD_CMD" | grep -qE '^(npm |npx )'; then
            echo "❌ LỖI: BUILD_CMD không hợp lệ: '$BUILD_CMD'"
            exit 1
          fi

      - name: 🏷️ Lấy thông tin Tag
        id: tag_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "📌 Tag: $TAG_NAME"

      - name: ⚙️ Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Cài đặt dependencies (nếu cần build)
        run: npm ci

      - name: ?? Ch?y Unit Tests
        run: npm run test

      - name: 🔨 Build dự án
        run: ${{ env.BUILD_CMD }}

      - name: 🔍 Lấy bản Release trước đó (Nếu có)
        id: prev_release
        run: |
          # Dùng GitHub CLI để lấy thông tin Release mới nhất
          PREV_TAG=$(gh release view --json tagName -q ".tagName" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "📌 Đã tìm thấy bản Release trước đó: $PREV_TAG"
            
            # Tìm tên file ZIP gốc (loại trừ file có chữ diff_data)
            FULL_ZIP=$(gh release view "$PREV_TAG" --json assets -q '.assets[].name | select(test("diff_data") | not) | select(endswith(".zip"))' | head -n 1)
            
            if [ -n "$FULL_ZIP" ]; then
              echo "⬇️ Tải file: $FULL_ZIP"
              gh release download "$PREV_TAG" -p "$FULL_ZIP" --dir prev_release
              
              # Giải nén vào thư mục public_old
              mkdir -p public_old
              unzip -q "prev_release/$FULL_ZIP" -d public_old
              echo "HAS_PREV_RELEASE=true" >> $GITHUB_ENV
            fi
          else
            echo "ℹ️ Đây là Release đầu tiên, không có bản cũ để so sánh."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✂️ Trích xuất các file thay đổi (Diff)
        if: env.HAS_PREV_RELEASE == 'true'
        run: |
          mkdir -p public_diff
          # So sánh nội dung file (-c) giữa bản mới và bản cũ
          rsync -rcv --compare-dest="$(pwd)/public_old/" "$(pwd)/$SOURCE_FOLDER/" "$(pwd)/public_diff/"
          
          # Dọn dẹp các file rác/không cần thiết khỏi thư mục diff để đếm chính xác
          find public_diff -type f -name '.DS_Store' -delete 2>/dev/null || true
          find public_diff -type f -name '*.map' -delete 2>/dev/null || true
          rm -rf public_diff/.deploy
          
          # Kiểm tra xem có file nào thực sự thay đổi không (bỏ qua thư mục rỗng)
          CHANGE_COUNT=$(find public_diff -type f | wc -l)
          if [ "$CHANGE_COUNT" -gt "0" ]; then
            DIFF_ZIP_NAME="${PROJECT_DIR}_diff_data_${TAG_NAME}.zip"
            
            # Nén thư mục diff
            cd public_diff
            zip -r "../$DIFF_ZIP_NAME" .
            cd ..
            
            DIFF_ZIP_SIZE=$(du -h "$DIFF_ZIP_NAME" | cut -f1)
            echo "📦 Đã tạo file Diff: $DIFF_ZIP_NAME ($CHANGE_COUNT file thay đổi, kích thước: $DIFF_ZIP_SIZE)"
          else
            echo "ℹ️ Không có sự thay đổi nào về file tĩnh hợp lệ so với bản trước."
          fi

      - name: 📁 Nén thành file ZIP (Bản Full)
        run: |
          ZIP_NAME="${PROJECT_DIR}_${TAG_NAME}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          # Nén thư mục source (public/) thành ZIP sạch, giữ lại .htaccess
          cd "$SOURCE_FOLDER"
          zip -r "../$ZIP_NAME" . -x '.deploy/*' '.DS_Store' '*.map'
          cd ..

          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "📦 File: $ZIP_NAME ($ZIP_SIZE)"

      - name: 🚀 Tạo GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "🚀 Release ${{ env.TAG_NAME }}"
          body: |
            ## 📦 Release `${{ env.TAG_NAME }}`

            **Dự án**: `${{ env.PROJECT_DIR }}`
            **Ngày tạo**: ${{ github.event.head_commit.timestamp || 'N/A' }}
            **Người tạo**: @${{ github.actor }}

            ---

            ### 📥 Hướng dẫn
            1. Tải file **`.zip`** bên dưới mục **Assets**
               - Bản **`${{ env.PROJECT_DIR }}_${{ env.TAG_NAME }}.zip`**: Chứa toàn bộ source code sạch (bản đầy đủ).
               - Bản **`${{ env.PROJECT_DIR }}_diff_data_${{ env.TAG_NAME }}.zip`** *(nếu có)*: Chỉ chứa các file đã được chỉnh sửa/thêm mới so với bản phát hành trước đó.
            2. Giải nén và bàn giao cho khách hàng

            > ⚠️ File ZIP chỉ chứa code đã build sạch (thư mục `${{ env.SOURCE_FOLDER }}/`), không chứa `node_modules` hay source code gốc.
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.PROJECT_DIR }}_diff_data_${{ env.TAG_NAME }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

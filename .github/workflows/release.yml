# ──────────────────────────────────────────────────────────
# 📦 TỰ ĐỘNG TẠO RELEASE KHI DEVELOPER PUSH TAG MỚI
# ──────────────────────────────────────────────────────────
# Cách dùng:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Kết quả: GitHub tự động build → nén ZIP → tạo Release
# Admin/PM chỉ cần vào mục Releases trên GitHub tải file ZIP sạch.
# ──────────────────────────────────────────────────────────

name: 📦 Create Release on Tag

on:
  push:
    tags:
      - 'v*'  # Chỉ chạy khi push tag bắt đầu bằng "v" (vd: v1.0.0, v2.1.3)

permissions:
  contents: write  # Cần quyền write để tạo Release và upload file

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kéo Source Code
        uses: actions/checkout@v4

      - name: 🔍 Đọc cấu hình Build
        id: config
        run: |
          HAS_BUILD=$(jq -r '.has_build_step // false' deploy-config.json)
          BUILD_CMD=$(jq -r '.build_command // "npm run build"' deploy-config.json)
          SOURCE_FOLDER=$(jq -r '.source_folder // "public"' deploy-config.json)
          PROJECT_DIR=$(jq -r '.production.project_dir // "project"' deploy-config.json)
          echo "HAS_BUILD=$HAS_BUILD" >> $GITHUB_ENV
          echo "BUILD_CMD=$BUILD_CMD" >> $GITHUB_ENV
          echo "SOURCE_FOLDER=$SOURCE_FOLDER" >> $GITHUB_ENV
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

          # 🛡️ Validate BUILD_CMD (chỉ cho phép npm/npx commands)
          if [ "$HAS_BUILD" = "true" ]; then
            if ! echo "$BUILD_CMD" | grep -qE '^(npm |npx )'; then
              echo "❌ LỖI: BUILD_CMD không hợp lệ: '$BUILD_CMD'"
              exit 1
            fi
          fi

      - name: 🏷️ Lấy thông tin Tag
        id: tag_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "📌 Tag: $TAG_NAME"

      - name: ⚙️ Cài đặt Node.js
        if: env.HAS_BUILD == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Cài đặt dependencies (nếu cần build)
        if: env.HAS_BUILD == 'true'
        run: npm ci

      - name: ?? Ch?y Unit Tests
        if: env.HAS_BUILD == 'true'
        run: npm run test

      - name: 🔨 Build dự án
        if: env.HAS_BUILD == 'true'
        run: ${{ env.BUILD_CMD }}

      - name: 📁 Nén thành file ZIP
        run: |
          ZIP_NAME="${PROJECT_DIR}_${TAG_NAME}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          # Nén thư mục source (public/) thành ZIP sạch, giữ lại .htaccess
          cd "$SOURCE_FOLDER"
          zip -r "../$ZIP_NAME" . -x '.deploy/*' '.DS_Store' '*.map'
          cd ..

          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "📦 File: $ZIP_NAME ($ZIP_SIZE)"

      - name: 🚀 Tạo GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "🚀 Release ${{ env.TAG_NAME }}"
          body: |
            ## 📦 Release `${{ env.TAG_NAME }}`

            **Dự án**: `${{ env.PROJECT_DIR }}`
            **Ngày tạo**: ${{ github.event.head_commit.timestamp || 'N/A' }}
            **Người tạo**: @${{ github.actor }}

            ---

            ### 📥 Hướng dẫn
            1. Tải file **`.zip`** bên dưới mục **Assets**
            2. Giải nén và bàn giao cho khách hàng

            > ⚠️ File ZIP chỉ chứa code đã build sạch (thư mục `${{ env.SOURCE_FOLDER }}/`), không chứa `node_modules` hay source code gốc.
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
